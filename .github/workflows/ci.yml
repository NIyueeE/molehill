name: CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main", "dev"]

concurrency:
  # Documentation suggests ${{ github.head_ref }}, but that's only available on pull_request/pull_request_target triggers, so using ${{ github.ref }}.
  # On main, we want all builds to complete even if merging happens faster to make it easier to discover at which point something broke.
  group: ${{ github.ref == 'refs/heads/main' && format('ci-main-{0}', github.sha) || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          components: clippy, rustfmt
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo audit
        uses: actions-rust-lang/audit@v1
      - name: cargo machete
        run: cargo install cargo-machete --locked && cargo machete
      - name: Setup cargo-hack
        run: cargo install cargo-hack
      - name: Check all features
        run: >
          cargo hack check --feature-powerset --no-dev-deps
          --mutually-exclusive-features default,native-tls,websocket-native-tls,rustls,websocket-rustls

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Run tests with native-tls
        run: cargo test --verbose
      - name: Run tests with rustls
        run: cargo test --verbose --no-default-features --features server,client,rustls,noise,websocket-rustls,hot-reload

  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe: molehill
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            exe: molehill.exe
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            exe: molehill
            target: x86_64-apple-darwin
          - os: macos-latest
            exe: molehill
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build
      - uses: actions/upload-artifact@v4
        with:
          name: molehill-${{ matrix.target }}
          path: target/debug/${{ matrix.exe }}
